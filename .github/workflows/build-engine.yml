name: Build vMeer Engine (Stable Cross-Compile)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-engine:
    # Menggunakan runner PC standar karena compiler NDK Google berbasis x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Menggunakan action resmi untuk setup SDK & NDK yang stabil di arsitektur x86_64
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Jalankan kompilasi modul engine
      - name: Compile vMeer Engine Module
        run: ./gradlew :vmeer-module:assembleRelease

      # Upload file .AAR untuk AndroidIDE
      - name: Upload AAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar

      # ====================================================================
      # PERBAIKAN DI SINI: Menyapu bersih seluruh pusaka .so dan biner daemon
      # ====================================================================
      - name: Upload Native Binaries (vmeerd & Seluruh Benda Pusaka .so)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-native-binaries-arm64
          path: |
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/vmeerd
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/lib*.so
          if-no-files-found: error
