name: Build vMeer Engine (ARM64 Native)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-engine:
    # Menggunakan runner native ARM64 untuk mempercepat & menstabilkan build NDK/CMake
    runs-on: ubuntu-latest-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Mengonfigurasi Android SDK & NDK yang kompatibel dengan Linux ARM64
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Menjalankan proses kompilasi untuk modul engine
      - name: Compile vMeer Engine Module
        run: ./gradlew :vmeer-module:assembleRelease

      # Upload file .AAR untuk kebutuhan integrasi Java/Kotlin
      - name: Upload AAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar

      # PERBAIKAN FINAL: Upload Binary Native (vmeerd & libvmeer_engine.so)
      - name: Upload Native Binaries (vmeerd & libvmeer)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-native-binaries-arm64
          # Menggunakan tanda bintang (*) untuk melewati hash acak buatan CMake/Ninja
          path: |
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/vmeerd
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/libvmeer_engine.so
          if-no-files-found: error
