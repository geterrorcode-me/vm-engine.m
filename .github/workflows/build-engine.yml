name: Build vMeer Engine Modular
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Menyiapkan Android SDK dan menyetujui semua lisensi secara otomatis
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Melakukan kompilasi modul utama vMeer
      - name: Build vMeer AAR
        run: |
          chmod +x gradlew
          ./gradlew :vmeer-module:assembleRelease --no-daemon

      # Upload file .AAR untuk kebutuhan integrasi Java/Kotlin
      - name: Upload AAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar

