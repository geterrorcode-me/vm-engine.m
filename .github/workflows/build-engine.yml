name: Build vMeer Engine Modular
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Ini adalah pengganti sdkmanager manual. 
      # Dia akan menyiapkan SDK dan menyetujui lisensi otomatis.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build vMeer AAR
        run: |
          chmod +x gradlew
          ./gradlew :vmeer-module:assembleRelease --no-daemon

      - name: Upload AAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar

          # --- PERBAIKAN TAMBAHAN: Upload Native Binaries (vmeerd & .so) ---
      - name: Upload Native Binaries (vmeerd & libvmeer)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-native-binaries-arm64
          # Mengambil langsung dari folder build C++ Ninja untuk arm64-v8a
          path: |
            vmeer-module/.cxx/**/arm64-v8a/vmeerd
            vmeer-module/.cxx/**/arm64-v8a/*.so
