name: Build vMeer Engine (ARM64 Native)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-engine:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Mengonfigurasi variabel jalur Android SDK bawaan dari lingkungan Runner ARM
      - name: Configure Android SDK Path
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV

      # Membuat file local.properties dinamis agar Gradle mengenali SDK host ARM
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # PERBAIKAN: Menyetujui semua lisensi Android SDK & NDK secara otomatis
      - name: Accept Android SDK & NDK Licenses
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          # Membuat tanda persetujuan lisensi standar Google SDK & NDK
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          echo "d56f173417b0b47a87c53304cd24005941833e70" > "$ANDROID_SDK_ROOT/licenses/android-googletv-license"
          echo "65b0344c5a6650d113e74c2e44a51559134f71e9" > "$ANDROID_SDK_ROOT/licenses/android-sdk-arm-dbt-license"

      # Eksekusi kompilasi modul engine murni secara native (aarch64 ke aarch64)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile vMeer Engine Module
        run: ./gradlew :vmeer-module:assembleRelease

      # Upload file .AAR untuk kebutuhan integrasi Java/Kotlin di AndroidIDE
      - name: Upload AAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar

      # Upload Binary Native (vmeerd & libvmeer_engine.so) hasil kompilasi ARM murni
      - name: Upload Native Binaries (vmeerd & libvmeer)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-native-binaries-arm64
          path: |
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/vmeerd
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/libvmeer_engine.so
          if-no-files-found: error
