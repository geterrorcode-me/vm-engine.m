name: Build vMeer Engine (ARM64 Native)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-engine:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # PERBAIKAN 1: Tembak langsung path absolut Android SDK bawaan Ubuntu Runner
      - name: Configure Android SDK Path
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk-bundle" >> $GITHUB_ENV

      # PERBAIKAN 2: Tulis sdk.dir secara absolut di local.properties
      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      # PERBAIKAN 3: Suntik lisensi langsung ke path absolut SDK yang valid
      - name: Accept Android SDK & NDK Licenses
        run: |
          mkdir -p "/usr/local/lib/android/sdk/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "/usr/local/lib/android/sdk/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "/usr/local/lib/android/sdk/licenses/android-sdk-preview-license"
          echo "d56f173417b0b47a87c53304cd24005941833e70" > "/usr/local/lib/android/sdk/licenses/android-googletv-license"
          echo "65b0344c5a6650d113e74c2e44a51559134f71e9" > "/usr/local/lib/android/sdk/licenses/android-sdk-arm-dbt-license"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Mulai kompilasi biner native
      - name: Compile vMeer Engine Module
        run: ./gradlew :vmeer-module:assembleRelease

      # Upload file .AAR untuk AndroidIDE
      - name: Upload AAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar

      # Upload Binary Native (vmeerd & libvmeer_engine.so)
      - name: Upload Native Binaries (vmeerd & libvmeer)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-native-binaries-arm64
          path: |
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/vmeerd
            vmeer-module/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/libvmeer_engine.so
          if-no-files-found: error
