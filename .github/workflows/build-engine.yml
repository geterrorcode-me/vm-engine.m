name: Build vMeer Engine Modular
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Build vMeer AAR
        run: |
          chmod +x gradlew
          ./gradlew :vmeer-module:assembleRelease

      - name: Upload AAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmeer-engine-modular
          path: vmeer-module/build/outputs/aar/vmeer-module-release.aar
